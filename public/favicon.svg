<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="50%" style="stop-color:#00c6fb"/>
      <stop offset="100%" style="stop-color:#38b6ff"/>
    </linearGradient>
    <linearGradient id="shieldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9"/>
      <stop offset="100%" style="stop-color:#1a5276"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  
  <!-- Outer shield (border) -->
  <path d="M256 64 L400 128 L400 272 C400 360 336 424 256 448 C176 424 112 360 112 272 L112 128 Z" 
        fill="url(#shieldBorder)" opacity="0.9"/>
  
  <!-- Inner shield (main fill) -->
  <path d="M256 88 L380 144 L380 268 C380 348 322 406 256 428 C190 406 132 348 132 268 L132 144 Z" 
        fill="url(#shieldFill)" filter="url(#glow)"/>
  
  <!-- Highlight reflection -->
  <path d="M256 88 L380 144 L380 200 C300 180 220 160 132 200 L132 144 Z" 
        fill="white" opacity="0.15"/>
</svg>
